name: Android arm64 Release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-arm64-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: "17"
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      - name: Disable Kotlin incremental compilation
        run: |
          mkdir -p ~/.gradle
          echo "kotlin.incremental=false" >> ~/.gradle/gradle.properties

      - name: Build arm64 release APK with debug signing
        run: ./gradlew :ide-android:assembleRelease --console=plain --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v7.0.1
        with:
          name: codeassist-arm64-release-debug-signed-apk
          path: ide-android/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14
